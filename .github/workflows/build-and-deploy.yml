name: Build and deploy

on:
  push:
    branches:
      - main
      - test
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/uyc-webcam

jobs:
  deploy-static:
    name: Deploy static files to R2
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set deployment target
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "R2_BUCKET=uyc-webcam" >> "$GITHUB_ENV"
          else
            echo "R2_BUCKET=uyc-webcam-test" >> "$GITHUB_ENV"
          fi

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Prepare static files
        run: |
          rm -rf dist
          mkdir -p dist

          cp -r site/. dist/

      - name: Configure rclone for Cloudflare R2
        run: |
          mkdir -p ~/.config/rclone

          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_ACCESS_KEY_ID}
          secret_access_key = ${R2_SECRET_ACCESS_KEY}
          endpoint = https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com
          acl = private
          EOF
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload static files to R2
        run: |
          rclone sync dist "r2:${R2_BUCKET}" \
            --exclude "/var/**" \
            --progress \
            --s3-no-check-bucket \
            --s3-no-head

  build-docker:
    name: Build Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker image tags
        id: tags
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "tags=${IMAGE_NAME}:latest,${IMAGE_NAME}:prod-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${IMAGE_NAME}:test,${IMAGE_NAME}:test-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./capture
          file: ./capture/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          
  deploy-weather-worker:
    name: Deploy weather Worker
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set Worker deployment environment
        run: |
          if [ "${GITHUB_REF_NAME}" = "test" ]; then
            echo "WRANGLER_COMMAND=deploy src/index.ts --config wrangler.jsonc -e test" >> "$GITHUB_ENV"
          else
            echo "WRANGLER_COMMAND=deploy src/index.ts --config wrangler.jsonc" >> "$GITHUB_ENV"
          fi

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_WORKER_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_WORKER_ACCOUNT_ID }}
          workingDirectory: workers/weather-refresh
          wranglerVersion: "4"
          command: ${{ env.WRANGLER_COMMAND }}