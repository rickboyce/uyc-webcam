name: Update events data

on:
  workflow_dispatch:

  push:
    branches:
      - test

  schedule:
    - cron: "7 * * * *"

jobs:
  update-events:
    name: Fetch and upload events JSON
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set deployment target
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            echo "R2_BUCKET=uyc-webcam-test" >> "$GITHUB_ENV"
          else
            echo "R2_BUCKET=uyc-webcam" >> "$GITHUB_ENV"
          fi

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone for Cloudflare R2
        run: |
          mkdir -p ~/.config/rclone

          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_ACCESS_KEY_ID}
          secret_access_key = ${R2_SECRET_ACCESS_KEY}
          endpoint = https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com
          acl = private
          EOF
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Fetch and convert events ICS
        env:
          CALENDAR_URL: ${{ secrets.CALENDAR_URL }}
        run: |
          mkdir -p out/var

          python3 capture/ics-to-json.py \
            "$CALENDAR_URL" \
            out/var/events7day.json

      - name: Upload events JSON to R2
        run: |
          rclone copyto out/var/events7day.json "r2:${R2_BUCKET}/var/events7day.json" \
            --s3-no-check-bucket \
            --s3-no-head \
            --retries 3 \
            --low-level-retries 5