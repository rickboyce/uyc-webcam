name: Deploy weather worker

on:
  push:
    branches:
      - main
      - test
    paths:
      - 'workers/weather-refresh/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-weather-worker:
    name: Deploy weather worker
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Create Worker secrets file
        working-directory: workers/weather-refresh
        run: |
          : "${CLOUDFLARE_ZONE_ID:?Missing CLOUDFLARE_ZONE_ID secret}"
          : "${CLOUDFLARE_API_TOKEN:?Missing CLOUDFLARE_WORKER_API_TOKEN secret}"

          python3 - <<'PY'
          import json
          import os

          with open("worker-secrets.json", "w", encoding="utf-8") as f:
              json.dump(
                  {
                      "REFRESH_TOKEN": os.environ["WEATHER_REFRESH_TOKEN"],
                      "CLOUDFLARE_ZONE_ID": os.environ["CLOUDFLARE_ZONE_ID"],
                      "CLOUDFLARE_API_TOKEN": os.environ["CLOUDFLARE_API_TOKEN"]
                  },
                  f
              )
          PY
        env:
          WEATHER_REFRESH_TOKEN: ${{ secrets.WORKER_REFRESH_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKER_API_TOKEN }}

      - name: Set Worker deployment environment
        run: |
          if [ "${GITHUB_REF_NAME}" = "test" ]; then
            echo "WRANGLER_DEPLOY_COMMAND=deploy src/index.ts --config wrangler.jsonc -e test --secrets-file worker-secrets.json" >> "$GITHUB_ENV"
            echo "WRANGLER_TRIGGERS_COMMAND=triggers deploy --config wrangler.jsonc -e test" >> "$GITHUB_ENV"
            echo "WEATHER_REFRESH_URL=${TEST_WEATHER_REFRESH_URL}/refresh" >> "$GITHUB_ENV"
          else
            echo "WRANGLER_DEPLOY_COMMAND=deploy src/index.ts --config wrangler.jsonc --secrets-file worker-secrets.json" >> "$GITHUB_ENV"
            echo "WRANGLER_TRIGGERS_COMMAND=triggers deploy --config wrangler.jsonc" >> "$GITHUB_ENV"
            echo "WEATHER_REFRESH_URL=${PROD_WEATHER_REFRESH_URL}/refresh" >> "$GITHUB_ENV"
          fi
        env:
          TEST_WEATHER_REFRESH_URL: ${{ secrets.TEST_WEATHER_REFRESH_URL }}
          PROD_WEATHER_REFRESH_URL: ${{ secrets.PROD_WEATHER_REFRESH_URL }}

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_WORKER_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/weather-refresh
          wranglerVersion: "4"
          command: ${{ env.WRANGLER_DEPLOY_COMMAND }}

      - name: Deploy Worker triggers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_WORKER_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/weather-refresh
          wranglerVersion: "4"
          command: ${{ env.WRANGLER_TRIGGERS_COMMAND }}

      - name: Trigger weather refresh
        run: |
          curl --fail --silent --show-error --location \
            --retry 3 \
            --request POST \
            --header "Authorization: Bearer ${WEATHER_REFRESH_TOKEN}" \
            "${WEATHER_REFRESH_URL}"
        env:
          WEATHER_REFRESH_TOKEN: ${{ secrets.WORKER_REFRESH_TOKEN }}
