name: Deploy weather worker

on:
  push:
    branches:
      - main
      - test
    paths:
      - 'workers/weather-refresh/**'
      - 'workers/shared/**'
      - 'workers/package.json'
      - 'workers/package-lock.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-weather-worker:
    name: Deploy weather worker
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: workers/package-lock.json

      - name: Install dependencies
        working-directory: workers
        run: npm ci

      - name: Test shared Worker auth
        working-directory: workers
        run: npm run test:shared

      - name: Create Worker secrets file
        working-directory: workers/weather-refresh
        run: |
          python3 - <<'PY'
          import json
          import os

          secrets = {
              "CLOUDFLARE_ZONE_ID": os.environ["CLOUDFLARE_ZONE_ID"],
              "CLOUDFLARE_API_TOKEN": os.environ["CLOUDFLARE_API_TOKEN"],
              "ACCESS_AUD": os.environ["WORKERS_ACCESS_AUD"],
              "ACCESS_JWKS_URL": os.environ["CLOUDFLARE_ACCESS_JWKS_URL"]
          }

          with open("worker-secrets.json", "w", encoding="utf-8") as f:
              json.dump(secrets, f)
          PY
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKER_API_TOKEN }}
          WORKERS_ACCESS_AUD: ${{ secrets.WORKERS_ACCESS_AUD }}
          CLOUDFLARE_ACCESS_JWKS_URL: ${{ secrets.CLOUDFLARE_ACCESS_JWKS_URL }}

      - name: Set Worker deployment environment
        run: |
          if [ "${GITHUB_REF_NAME}" = "test" ]; then
            echo "WRANGLER_DEPLOY_COMMAND=deploy src/index.ts --config wrangler.jsonc -e test --secrets-file worker-secrets.json" >> "$GITHUB_ENV"
            echo "WRANGLER_TRIGGERS_COMMAND=triggers deploy --config wrangler.jsonc -e test" >> "$GITHUB_ENV"
            WORKER_ENVIRONMENT="test"
          else
            echo "WRANGLER_DEPLOY_COMMAND=deploy src/index.ts --config wrangler.jsonc --secrets-file worker-secrets.json" >> "$GITHUB_ENV"
            echo "WRANGLER_TRIGGERS_COMMAND=triggers deploy --config wrangler.jsonc" >> "$GITHUB_ENV"
            WORKER_ENVIRONMENT="prod"
          fi

          echo "WEATHER_REFRESH_URL=https://workers.uyc.boats/${WORKER_ENVIRONMENT}/weather-worker/refresh" >> "$GITHUB_ENV"

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_WORKER_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/weather-refresh
          wranglerVersion: "4"
          command: ${{ env.WRANGLER_DEPLOY_COMMAND }}

      - name: Deploy Worker triggers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_WORKER_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/weather-refresh
          wranglerVersion: "4"
          command: ${{ env.WRANGLER_TRIGGERS_COMMAND }}

      - name: Trigger weather refresh
        run: |
          curl --fail --silent --show-error --location \
            --retry 3 \
            --request POST \
            --header "CF-Access-Client-Id: ${CLOUDFLARE_ACCESS_CLIENT_ID}" \
            --header "CF-Access-Client-Secret: ${CLOUDFLARE_ACCESS_CLIENT_SECRET}" \
            "${WEATHER_REFRESH_URL}"
        env:
          CLOUDFLARE_ACCESS_CLIENT_ID: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_ID }}
          CLOUDFLARE_ACCESS_CLIENT_SECRET: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_SECRET }}
