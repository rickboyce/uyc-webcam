name: Update weather data

on:
  workflow_dispatch:

  push:
    branches:
      - test

  schedule:
    - cron: "16/15 * * * *"

env:
  WEATHER_API_URL: >-
    https://api.open-meteo.com/v1/forecast?latitude=54.5950&longitude=-2.8412&current=temperature_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,wind_gusts_10m,wind_direction_10m&hourly=temperature_2m,precipitation_probability,weather_code,wind_speed_10m,wind_gusts_10m,wind_direction_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,wind_speed_10m_max,wind_gusts_10m_max&timezone=Europe%2FLondon&wind_speed_unit=mph

jobs:
  update-weather:
    name: Fetch and upload weather JSON
    runs-on: ubuntu-latest

    steps:
      - name: Set deployment target
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            echo "R2_BUCKET=uyc-webcam-test" >> "$GITHUB_ENV"
          else
            echo "R2_BUCKET=uyc-webcam" >> "$GITHUB_ENV"
          fi

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone for Cloudflare R2
        run: |
          mkdir -p ~/.config/rclone

          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_ACCESS_KEY_ID}
          secret_access_key = ${R2_SECRET_ACCESS_KEY}
          endpoint = https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com
          acl = private
          EOF
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Fetch weather JSON
        run: |
          mkdir -p out/var

          curl --fail --silent --show-error --location \
            "$WEATHER_API_URL" \
            --output out/var/weather.json

      - name: Upload weather JSON to R2
        run: |
          rclone copyto out/var/weather.json "r2:${R2_BUCKET}/var/weather.json" \
            --s3-no-check-bucket \
            --s3-no-head \
            --retries 3 \
            --low-level-retries 5