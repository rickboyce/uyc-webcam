name: Deploy static site

on:
  push:
    branches:
      - main
      - test
    paths:
      - 'site/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-static:
    name: Deploy static files to R2
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set deployment target
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "R2_BUCKET=uyc-webcam" >> "$GITHUB_ENV"
          else
            echo "R2_BUCKET=uyc-webcam-test" >> "$GITHUB_ENV"
          fi

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare static files
        run: |
          rm -rf dist
          mkdir -p dist

          cp -r site/. dist/

          export SITE_CSS_VERSION="${GITHUB_SHA::12}"
          SITE_CSS_PATH="dist/assets/site.${SITE_CSS_VERSION}.css"

          mv dist/assets/site.css "${SITE_CSS_PATH}"

          CSS_MARKER='href="/assets/site.css" data-build-href="/assets/site.__SITE_VERSION__.css"'
          CSS_HREF="href=\"/assets/site.${SITE_CSS_VERSION}.css\""

          if ! grep -Fq "${CSS_MARKER}" dist/index.html; then
            echo "CSS build marker not found in dist/index.html" >&2
            exit 1
          fi

          sed "s|${CSS_MARKER}|${CSS_HREF}|" dist/index.html > dist/index.html.tmp
          mv dist/index.html.tmp dist/index.html

          npx --yes lightningcss-cli@1 \
            --minify \
            --targets "defaults" \
            "${SITE_CSS_PATH}" \
            -o "${SITE_CSS_PATH}"

      - name: Configure rclone for Cloudflare R2
        run: |
          mkdir -p ~/.config/rclone

          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_ACCESS_KEY_ID}
          secret_access_key = ${R2_SECRET_ACCESS_KEY}
          endpoint = https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com
          acl = private
          EOF
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload static files to R2
        run: |
          rclone sync dist "r2:${R2_BUCKET}" \
            --exclude "/var/**" \
            --progress \
            --s3-no-check-bucket \
            --s3-no-head
